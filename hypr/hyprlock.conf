source = ~/.config/omarchy/current/theme/hyprlock.conf

general {
    ignore_empty_input = true
}

background {
    monitor =
    color = $color
    path = ~/.config/omarchy/current/background
    blur_size = 4
    blur_passes = 3
    brightness = 0.7
}

animations {
    enabled = true
}

input-field {
    monitor =
    size = 340, 67

    dots_size = 0.22
    dots_spacing = 0.4
    dots_center = true
    dots_rounding = -1

    outline_thickness = 3
    inner_color = $inner_color
    outer_color = $outer_color
    font_color = $font_color

    check_color = $check_color
    fail_color = rgba(ff6060ee)

    fade_on_empty = false
    fade_timeout = 1000
    hide_input = false

    placeholder_text = <i>Enter Password...</i>
    fail_text = FAIL <b>($ATTEMPTS)</b>

    position = 0,0
    halign = center
    valign = center

    rounding = 15
}

# -------- CLOCK --------
label {
    monitor =
    text = $TIME
    color = $font_color
    font_size = 16
    font_family = JetBrainsMono Nerd Font Propo

    position = -40,-30
    halign = right
    valign = top
}

# -------- DATE --------
label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    color = $font_color
    font_size = 16
    font_family = JetBrainsMono Nerd Font Propo

    position = 50,-30
    halign = left
    valign = top
}

auth {
    fingerprint:enabled = false
}
